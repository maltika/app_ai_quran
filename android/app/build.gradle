plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.app_ai_quran"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.app_ai_quran"
        minSdkVersion 26
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        multiDexEnabled true

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }



    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    packagingOptions {
        pickFirst 'lib/x86_64/libonnxruntime.so'
        pickFirst 'lib/x86/libonnxruntime.so'
        pickFirst 'lib/arm64-v8a/libonnxruntime.so'
        pickFirst 'lib/armeabi-v7a/libonnxruntime.so'

        resources {
            // ดึงกลุ่ม pickFirst มาไว้ด้วยกัน
            pickFirst 'com/google/common/base/Optional.class'
            pickFirst 'com/google/common/base/Predicate.class'
            pickFirst 'com/google/common/base/Function.class'
            pickFirst 'com/google/common/base/Supplier.class'
            
            // จับกลุ่ม exclude ทั้งหมดมาไว้ในลิสต์เดียว
            excludes += [
                'com/google/common/base/VerifyException.class', // ย้ายมาไว้ตรงนี้
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/NOTICE',
                'META-INF/*.kotlin_module',
                '**/listenablefuture_google_prerelease.gwt.xml'
            ]
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // บังคับใช้ Guava เวอร์ชันเดียวกับเครื่องคุณเป๊ะๆ
    implementation "com.google.guava:guava:33.4.0-android"
    implementation "com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava"
}